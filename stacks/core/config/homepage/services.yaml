---
- Infrastructure:
    - Portainer:
        icon: portainer.png
        href: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
        description: Container management

    - Nginx Proxy Manager:
        icon: nginx-proxy-manager.png
        href: "{{HOMEPAGE_VAR_NPM_URL}}"
        description: Reverse proxy
        widget:
          type: npm
          url: "{{HOMEPAGE_VAR_NPM_URL}}"
          username: "{{HOMEPAGE_VAR_NPM_EMAIL}}"
          password: "{{HOMEPAGE_VAR_NPM_PASSWORD}}"

- Network:
    - Speedtest Tracker:
        icon: speedtest-tracker.png
        href: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
        description: Internet speed monitoring
        widget:
          type: speedtest
          url: http://speedtest-tracker:80
          version: 1

- Downloads:
    - qBittorrent:
        icon: qbittorrent.png
        href: "{{HOMEPAGE_VAR_QBITTORRENT_URL}}"
        description: Torrent client
        widget:
          type: qbittorrent
          url: http://qbittorrent:8080
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"

- Music:
    - Navidrome:
        icon: navidrome.png
        href: "{{HOMEPAGE_VAR_NAVIDROME_URL}}"
        description: Music streaming server
        widget:
          type: navidrome
          url: http://navidrome:4533
          user: "{{HOMEPAGE_VAR_NAVIDROME_USER}}"
          token: "{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}"
          salt: "{{HOMEPAGE_VAR_NAVIDROME_SALT}}"

- Media:
    - Plex:
        icon: plex.png
        href: "{{HOMEPAGE_VAR_PLEX_URL}}"
        description: Media server
        widget:
          type: plex
          url: http://plex:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"

    - Jellyfin:
        icon: jellyfin.png
        href: "{{HOMEPAGE_VAR_JELLYFIN_URL}}"
        description: Open-source media server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
          enableNowPlaying: true
