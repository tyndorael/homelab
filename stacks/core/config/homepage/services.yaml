---
- Diagrams:
    - Excalidraw:
        icon: https://excalidraw.com/favicon.ico
        href: "{{HOMEPAGE_VAR_EXCALIDRAW_URL}}"
        description: Whiteboard and freehand sketching

    - draw.io:
        icon: https://app.diagrams.net/favicon.ico
        href: "{{HOMEPAGE_VAR_DRAWIO_URL}}"
        description: Flowcharts, UML, and network diagrams

- Infrastructure:
    - Portainer:
        icon: portainer.png
        href: "{{HOMEPAGE_VAR_PORTAINER_URL}}"
        description: Container management

    - Nginx Proxy Manager:
        icon: nginx-proxy-manager.png
        href: "{{HOMEPAGE_VAR_NPM_URL}}"
        description: Reverse proxy
        widget:
          type: npm
          url: "{{HOMEPAGE_VAR_NPM_URL}}"
          username: "{{HOMEPAGE_VAR_NPM_EMAIL}}"
          password: "{{HOMEPAGE_VAR_NPM_PASSWORD}}"

    - Dozzle:
        icon: dozzle.png
        href: "{{HOMEPAGE_VAR_DOZZLE_URL}}"
        description: Container log viewer

- Remote Access:
    - Guacamole:
        icon: guacamole.png
        href: "{{HOMEPAGE_VAR_GUACAMOLE_URL}}"
        description: Clientless remote desktop gateway
        widget:
          type: guacamole
          url: http://guacamole:8080
          username: "{{HOMEPAGE_VAR_GUACAMOLE_USERNAME}}"
          password: "{{HOMEPAGE_VAR_GUACAMOLE_PASSWORD}}"

    - Cockpit:
        icon: cockpit.png
        href: "{{HOMEPAGE_VAR_COCKPIT_URL}}"
        description: Host web administration

- Network:
    - Speedtest Tracker:
        icon: speedtest-tracker.png
        href: "{{HOMEPAGE_VAR_SPEEDTEST_URL}}"
        description: Internet speed monitoring
        widget:
          type: speedtest
          url: http://speedtest-tracker:80
          version: 1

- AI:
    - ComfyUI:
        icon: comfyui.png
        href: "{{HOMEPAGE_VAR_COMFYUI_URL}}"
        description: AI image generation

    - Open WebUI:
        icon: open-webui.png
        href: "{{HOMEPAGE_VAR_OPENWEBUI_URL}}"
        description: LLM chat frontend

- Monitoring:
    - Beszel:
        icon: beszel.png
        href: "{{HOMEPAGE_VAR_BESZEL_URL}}"
        description: Server resource monitoring

    - Uptime Kuma:
        icon: uptime-kuma.png
        href: "{{HOMEPAGE_VAR_UPTIMEKUMA_URL}}"
        description: Uptime monitoring
        widget:
          type: uptimekuma
          url: http://uptime-kuma:3001
          # Create a status page with this slug in Uptime Kuma for the widget to populate
          slug: homelab

    - Scrutiny:
        icon: scrutiny.png
        href: "{{HOMEPAGE_VAR_SCRUTINY_URL}}"
        description: SMART disk health
        widget:
          type: scrutiny
          url: http://scrutiny:8080

    - Glances:
        icon: glances.png
        href: "{{HOMEPAGE_VAR_GLANCES_URL}}"
        description: Host metrics
        widget:
          type: glances
          url: http://glances:61208
          version: 4
          metric: cpu

- Downloads:
    - qBittorrent:
        icon: qbittorrent.png
        href: "{{HOMEPAGE_VAR_QBITTORRENT_URL}}"
        description: Torrent client
        widget:
          type: qbittorrent
          url: http://qbittorrent:8080
          username: "{{HOMEPAGE_VAR_QBITTORRENT_USERNAME}}"
          password: "{{HOMEPAGE_VAR_QBITTORRENT_PASSWORD}}"

- Music:
    - Navidrome:
        icon: navidrome.png
        href: "{{HOMEPAGE_VAR_NAVIDROME_URL}}"
        description: Music streaming server
        widget:
          type: navidrome
          url: http://navidrome:4533
          user: "{{HOMEPAGE_VAR_NAVIDROME_USER}}"
          token: "{{HOMEPAGE_VAR_NAVIDROME_TOKEN}}"
          salt: "{{HOMEPAGE_VAR_NAVIDROME_SALT}}"

- Media:
    - Plex:
        icon: plex.png
        href: "{{HOMEPAGE_VAR_PLEX_URL}}"
        description: Media server
        widget:
          type: plex
          url: http://plex:32400
          key: "{{HOMEPAGE_VAR_PLEX_TOKEN}}"

    - Jellyfin:
        icon: jellyfin.png
        href: "{{HOMEPAGE_VAR_JELLYFIN_URL}}"
        description: Open-source media server
        widget:
          type: jellyfin
          url: http://jellyfin:8096
          key: "{{HOMEPAGE_VAR_JELLYFIN_API_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Tautulli:
        icon: tautulli.png
        href: "{{HOMEPAGE_VAR_TAUTULLI_URL}}"
        description: Plex usage analytics
        widget:
          type: tautulli
          url: http://tautulli:8181
          key: "{{HOMEPAGE_VAR_TAUTULLI_KEY}}"

    - Bazarr:
        icon: bazarr.png
        href: "{{HOMEPAGE_VAR_BAZARR_URL}}"
        description: Subtitle automation
        widget:
          type: bazarr
          url: http://bazarr:6767
          key: "{{HOMEPAGE_VAR_BAZARR_KEY}}"
